<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sistema de Cinema</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Cinema</h1>

      <p class="subtitulo">
        Confira os assentos disponíveis e selecione o que você procura:
      </p>

      <div class="legenda">
        <div class="item-legenda">
          <span class="quadrado livre"></span>
          Disponível
        </div>

        <div class="item-legenda">
          <span class="quadrado ocupado"></span>
          Ocupado
        </div>

        <div class="item-legenda">
          <span class="quadrado selecionado"></span>
          Selecionado
        </div>
      </div>

      <div class="assentos-demo">
        <div class="assento" data-assento="A1">A1</div>
        <div class="assento" data-assento="A2">A2</div>
        <div class="assento" data-assento="A3">A3</div>
        <div class="assento" data-assento="A4">A4</div>
        <div class="assento" data-assento="A5">A5</div>

        <div class="assento" data-assento="B1">B1</div>
        <div class="assento" data-assento="B2">B2</div>
        <div class="assento" data-assento="B3">B3</div>
        <div class="assento" data-assento="B4">B4</div>
        <div class="assento" data-assento="B5">B5</div>

        <div class="assento" data-assento="C1">C1</div>
        <div class="assento" data-assento="C2">C2</div>
        <div class="assento" data-assento="C3">C3</div>
        <div class="assento" data-assento="C4">C4</div>
        <div class="assento" data-assento="C5">C5</div>
      </div>

      <p>Selecione um assento:</p>

      <select id="assento">
        <option>A1</option>
        <option>A2</option>
        <option>A3</option>
        <option>A4</option>
        <option>A5</option>

        <option>B1</option>
        <option>B2</option>
        <option>B3</option>
        <option>B4</option>
        <option>B5</option>

        <option>C1</option>
        <option>C2</option>
        <option>C3</option>
        <option>C4</option>
        <option>C5</option>
      </select>

      <button id="comprar">Comprar Ingresso</button>

      <button id="cancelar">Cancelar Compra</button>

      <p id="mensagem"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
