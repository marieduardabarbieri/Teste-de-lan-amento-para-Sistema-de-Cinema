<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sistema de Cinema</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="cinema-screen"></div>

      <h1>Sistema de Cinema</h1>

      <p class="subtitulo">
        Simulação para Testes de Lançamento (Release Testing)
      </p>

      <div class="assentos-demo">
        <div class="assento">A1</div>
        <div class="assento">A2</div>
        <div class="assento">A3</div>
        <div class="assento">A4</div>
        <div class="assento">A5</div>

        <div class="assento">B1</div>
        <div class="assento">B2</div>
        <div class="assento">B3</div>
        <div class="assento">B4</div>
        <div class="assento">B5</div>

        <div class="assento">C1</div>
        <div class="assento">C2</div>
        <div class="assento">C3</div>
        <div class="assento">C4</div>
        <div class="assento">C5</div>
      </div>

      <p>Selecione um assento:</p>

      <select id="assento">
        <option>A1</option>
        <option>A2</option>
        <option>A3</option>
        <option>A4</option>
        <option>A5</option>

        <option>B1</option>
        <option>B2</option>
        <option>B3</option>
        <option>B4</option>
        <option>B5</option>

        <option>C1</option>
        <option>C2</option>
        <option>C3</option>
        <option>C4</option>
        <option>C5</option>
      </select>

      <button id="comprar">Comprar Ingresso</button>

      <button id="cancelar">Cancelar Compra</button>

      <p id="mensagem"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
